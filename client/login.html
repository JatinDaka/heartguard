<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — HeartGuard Mobile</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #ffffff;
            color: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-card {
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .logo-container {
            margin-bottom: 2rem;
        }

        .heart-logo {
            width: 80px;
            height: 80px;
            background: #E24B4A;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 8px 24px rgba(226, 75, 74, 0.2);
        }

        .brand-name {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .brand-subtitle {
            color: #6c757d;
            font-size: 1.1rem;
            margin-bottom: 3rem;
        }

        .form-card {
            background: #ffffff;
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
        }

        .form-control-hg {
            background: #F8F9FA;
            border: none;
            border-radius: 14px;
            padding: 14px 20px;
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        .form-control-hg:focus {
            background: #F1F3F5;
            box-shadow: none;
            outline: 2px solid #E24B4A;
        }

        .btn-hg {
            background: #4C84FF; /* Matches the blue in the screenshot button at the bottom */
            color: white;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-weight: 700;
            width: 100%;
            margin-top: 1rem;
            transition: transform 0.2s;
        }

        .btn-hg:active {
            transform: scale(0.98);
        }

        .auth-toggle {
            margin-top: 2rem;
            font-size: 0.95rem;
        }

        .auth-toggle a {
            color: #4C84FF;
            text-decoration: none;
            font-weight: 700;
        }

        /* Matches the 'Three-Layer AI Protection' header style */
        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #000;
            font-weight: 700;
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
        }

        .icon-box {
            width: 32px;
            height: 32px;
            background: #EBF2FF;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4C84FF;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="logo-container">
            <div class="heart-logo">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="white">
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                </svg>
            </div>
            <h1 class="brand-name">HeartGuard Mobile</h1>
            <p class="brand-subtitle">AI-Powered Heart Health Monitoring</p>
        </div>

        <div class="form-card">
            <div id="login-view">
                <div class="section-header">
                    <div class="icon-box">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                    </div>
                    <span>Sign In to Your Account</span>
                </div>
                <input type="email" class="form-control form-control-hg" placeholder="Ashu@123">
                <input type="password" class="form-control form-control-hg" placeholder="0000">
                <button class="btn btn-hg" onclick="handleAuth()">Sign In</button>
                <div class="auth-toggle">
                    Don't have an account? <a href="#" onclick="toggleView(false)">Create one</a>
                </div>
            </div>

            <div id="signup-view" style="display: none;">
                <div class="section-header">
                    <div class="icon-box">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
                    </div>
                    <span>Create Your Health Profile</span>
                </div>
                <input type="text" class="form-control form-control-hg" placeholder="Full Name">
                <input type="email" class="form-control form-control-hg" placeholder="Email Address">
                <input type="password" class="form-control form-control-hg" placeholder="Create Password">
                <button class="btn btn-hg" onclick="handleAuth()">Create Account</button>
                <div class="auth-toggle">
                    Already have an account? <a href="#" onclick="toggleView(true)">Sign In</a>
                </div>
            </div>
        </div>
        
        <p class="mt-4 small text-muted">By continuing, you agree to HeartGuard's <br> <b>Terms of Service</b> and <b>Privacy Policy</b></p>
    </div>

    <script>
        function toggleView(showLogin) {
            document.getElementById('login-view').style.display = showLogin ? 'block' : 'none';
            document.getElementById('signup-view').style.display = showLogin ? 'none' : 'block';
        }

        function handleAuth() {
            const email = document.querySelector('#login-view input[type="email"]').value;
            const password = document.querySelector('#login-view input[type="password"]').value;

            if (email === 'Ashu@123' && password === '0000') {
                // Generate a dummy JWT token
                const dummyToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJBc2h1IiwiZXhwIjoyNTMzNzU5OTAwfQ';
                localStorage.setItem('hg_token', dummyToken);
                window.location.href = 'index.html';
            } else {
                alert('Invalid credentials. Please use Ashu@123 / 0000');
            }
        }
    </script>
</body>
</html>
